site_name: Rovo Documentation
site_url: https://wireofparadise.github.io/rovo/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.action.edit

repo_url: https://github.com/wireofparadise/rovo
repo_name: rovo
edit_uri: edit/main/docs/

nav:
  - Introduction: index.md

extra:
  version:
    provider: mike

markdown_extensions:
  - abbr
  - admonition
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

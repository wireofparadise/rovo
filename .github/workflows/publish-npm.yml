name: Publish npm package

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set-up rokit
        uses: CompeyDev/setup-rokit@v0.2.0

      - name: Run tests
        run: lune run tests

      - name: Set-up node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Publish package to npm
        run: npm publish --provenance
